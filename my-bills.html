<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="assets/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customer Portal — My Bills</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <style>
        /* ════════════════════════════════════════════════
   TOKENS
════════════════════════════════════════════════ */
        :root {
            --font: 'Inter', system-ui, sans-serif;
            --mono: 'JetBrains Mono', monospace;

            /* Brand */
            --brand: #5b3fff;
            --brand-hover: #4a30e8;
            --brand-subtle: rgba(91, 63, 255, .08);
            --brand-subtle-hover: rgba(91, 63, 255, .13);
            --brand-border: rgba(91, 63, 255, .2);

            /* Surfaces — slightly tinted, less stark white */
            --bg: linear-gradient(155deg, #f0f0f8 0%, #f4f3fb 40%, #eff0f7 100%);
            --bg-solid: #f2f1f9;
            --surface: #ffffff;
            --surface-2: #fbfaff;

            /* Borders — refined */
            --line: #e6e5f0;
            --line-2: #cccce0;

            /* Text — improved contrast hierarchy */
            --t1: #07071a;
            --t2: #42425c;
            --t3: #8484a6;

            /* Status */
            --green: #057a55;
            --green-bg: #f0fdf8;
            --green-border: #6ee7c7;
            --amber: #b45309;
            --amber-bg: #fffbeb;
            --amber-border: #fbbf24;
            --red: #be1b37;
            --red-bg: #fff1f2;
            --red-border: #fda4af;
            --gray: #52525b;
            --gray-bg: #f4f4f5;
            --gray-border: #d4d4d8;

            /* Shadows — richer depth system */
            --shadow-xs: 0 1px 2px rgba(15, 10, 50, .05);
            --shadow-sm: 0 1px 4px rgba(15, 10, 50, .07), 0 1px 2px rgba(15, 10, 50, .04);
            --shadow-md: 0 6px 20px rgba(15, 10, 50, .09), 0 2px 6px rgba(15, 10, 50, .05);
            --shadow-lg: 0 12px 32px rgba(15, 10, 50, .12), 0 4px 12px rgba(15, 10, 50, .06);
            --shadow-brand: 0 6px 20px rgba(91, 63, 255, .18), 0 2px 6px rgba(91, 63, 255, .1);

            /* Layout */
            --sb: 232px;
            --tb: 57px;
            --r: 12px;
            --r-sm: 8px;
        }

        /* ════════════════════════════════════════════════
   RESET + BASE
════════════════════════════════════════════════ */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        html {
            -webkit-text-size-adjust: 100%
        }

        body {
            font-family: var(--font);
            background: var(--bg-solid);
            background-image: var(--bg);
            color: var(--t1);
            font-size: 13.5px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            opacity: 0;
            transition: opacity .35s ease;
        }

        body.up {
            opacity: 1
        }

        a {
            text-decoration: none;
            color: inherit
        }

        button {
            font-family: var(--font);
            cursor: pointer
        }

        svg {
            display: block
        }

        /* ════════════════════════════════════════════════
   LAYOUT SHELL
════════════════════════════════════════════════ */
        .shell {
            display: flex;
            min-height: 100vh
        }

        .main {
            margin-left: var(--sb);
            flex: 1;
            display: flex;
            flex-direction: column
        }

        /* ════════════════════════════════════════════════
   SIDEBAR — premium feel
════════════════════════════════════════════════ */
        .sb {
            width: var(--sb);
            background: var(--surface);
            border-right: 1px solid var(--line);
            box-shadow: 1px 0 0 0 var(--line), 3px 0 12px rgba(15, 10, 50, .04);
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            z-index: 200;
            overflow-y: auto;
        }

                /* BillSathi Logo */
        .sb-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px 13px;
            border-bottom: 1px solid var(--line);
            flex-shrink: 0;
            text-decoration: none;
        }
        .sb-logo-img { height: 52px; width: auto; max-width: none; max-height: none; object-fit: contain; display: block; background: transparent; border: none; box-shadow: none; image-rendering: -webkit-optimize-contrast; image-rendering: crisp-edges; }
    @media (max-width: 768px) { .sb-logo-img { height: 42px; } }
        .sb-logo-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--t1);
            letter-spacing: -.4px;
        }
        .sb-logo-name em {
            color: var(--brand);
            font-style: normal;
        }

        /* Nav */
        .sb-body {
            flex: 1;
            padding: 14px 10px;
            overflow-y: auto
        }

        .sb-sect {
            margin-bottom: 24px
        }

        .sb-sect-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--t3);
            text-transform: uppercase;
            letter-spacing: .1em;
            padding: 0 10px;
            margin-bottom: 5px;
        }

        .sb-link {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 8px 10px;
            border-radius: var(--r-sm);
            font-size: 13.5px;
            font-weight: 500;
            color: var(--t2);
            transition: background .18s ease, color .18s ease, box-shadow .18s ease;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            margin-bottom: 1px;
        }

        .sb-link svg {
            width: 15px;
            height: 15px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
            transition: opacity .18s ease;
            opacity: .55;
        }

        .sb-link:hover {
            background: var(--bg-solid);
            color: var(--t1);
            box-shadow: none
        }

        .sb-link:hover svg {
            opacity: .85
        }

        /* Premium active state with glow */
        .sb-link.active {
            background: var(--brand-subtle);
            color: var(--brand);
            font-weight: 600;
            box-shadow: inset 2px 0 0 var(--brand), 0 1px 4px rgba(91, 63, 255, .08);
        }

        .sb-link.active svg {
            opacity: 1;
            stroke: var(--brand)
        }

        .sb-badge {
            margin-left: auto;
            font-size: 10.5px;
            font-weight: 600;
            color: var(--t3);
            background: var(--bg-solid);
            border: 1px solid var(--line);
            padding: 1px 7px;
            border-radius: 99px;
            line-height: 1.6;
        }

        /* Footer */
        .sb-foot {
            padding: 10px;
            border-top: 1px solid var(--line);
            flex-shrink: 0;
        }

        .sb-user {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 9px 10px;
            border-radius: var(--r-sm);
            cursor: pointer;
            transition: background .18s ease;
        }

        .sb-user:hover {
            background: var(--bg-solid)
        }

        .sb-av {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6b4fff 0%, #4a30e8 100%);
            display: grid;
            place-items: center;
            font-size: 11.5px;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
            box-shadow: 0 0 0 2px rgba(91, 63, 255, .2), 0 2px 6px rgba(91, 63, 255, .2);
        }

        .sb-uinfo .uname {
            font-size: 13px;
            font-weight: 600;
            color: var(--t1);
            letter-spacing: -.1px
        }

        .sb-uinfo .urole {
            font-size: 11px;
            color: var(--t3);
            margin-top: 1px
        }

        .sb-user-icon {
            margin-left: auto;
            color: var(--t3)
        }

        .sb-user-icon svg {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round
        }

        /* ════════════════════════════════════════════════
   TOPBAR — elevated
════════════════════════════════════════════════ */
        .topbar {
            height: var(--tb);
            background: rgba(255, 255, 255, .92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--line);
            box-shadow: 0 1px 0 var(--line), 0 2px 12px rgba(15, 10, 50, .04);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 26px;
            position: sticky;
            top: 0;
            z-index: 100;
            flex-shrink: 0;
        }

        .tb-trail {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px
        }

        .tb-trail-home {
            color: var(--t3);
            font-weight: 500
        }

        .tb-trail-sep {
            color: var(--line-2)
        }

        .tb-trail-cur {
            font-weight: 700;
            color: var(--t1);
            letter-spacing: -.15px
        }

        .tb-actions {
            display: flex;
            align-items: center;
            gap: 7px
        }

        .tb-search-box {
            display: flex;
            align-items: center;
            gap: 7px;
            height: 33px;
            padding: 0 11px;
            background: var(--bg-solid);
            border: 1px solid var(--line);
            border-radius: var(--r-sm);
            font-size: 13px;
            color: var(--t3);
            min-width: 210px;
            transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
            cursor: text;
        }

        .tb-search-box:hover,
        .tb-search-box:focus-within {
            border-color: var(--brand);
            box-shadow: 0 0 0 3px rgba(91,63,255,.1);
            background: #fff
        }

        .tb-search-box svg {
            width: 13px;
            height: 13px;
            stroke: var(--t3);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            flex-shrink: 0
        }

        .tb-search-box input {
            border: none;
            background: transparent;
            font-family: var(--font);
            font-size: 13px;
            color: var(--t1);
            outline: none;
            width: 100%;
        }

        .tb-search-box input::placeholder { color: var(--t3); }

        .tb-icon {
            width: 33px;
            height: 33px;
            border-radius: var(--r-sm);
            background: var(--bg-solid);
            border: 1px solid var(--line);
            display: grid;
            place-items: center;
            cursor: pointer;
            position: relative;
            transition: border-color .18s ease, background .18s ease, box-shadow .18s ease, transform .15s ease;
        }

        .tb-icon:hover {
            border-color: var(--line-2);
            background: var(--surface);
            box-shadow: var(--shadow-sm);
            transform: translateY(-1px)
        }

        .tb-icon svg {
            width: 15px;
            height: 15px;
            stroke: var(--t2);
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round
        }

        .tb-pip {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--red);
            border: 1.5px solid var(--surface);
            box-shadow: 0 0 4px rgba(190, 27, 55, .4);
        }

        .tb-av {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6b4fff 0%, #4a30e8 100%);
            display: grid;
            place-items: center;
            font-size: 11.5px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            border: 2px solid rgba(91, 63, 255, .2);
            transition: border-color .18s ease, box-shadow .18s ease, transform .15s ease;
            box-shadow: 0 2px 6px rgba(91, 63, 255, .2);
        }

        .tb-av:hover {
            border-color: rgba(91, 63, 255, .45);
            box-shadow: 0 0 0 3px rgba(91, 63, 255, .12), 0 4px 10px rgba(91, 63, 255, .25);
            transform: translateY(-1px)
        }

        /* ════════════════════════════════════════════════
   PAGE CONTENT
════════════════════════════════════════════════ */
        .page {
            padding: 30px 26px;
            flex: 1;
            display: none;
            opacity: 0;
            animation: fadeIn 0.3s ease forwards;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Page Header ── */
        .pg-hdr {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .pg-hdr h1 {
            font-size: 21px;
            font-weight: 800;
            color: var(--t1);
            letter-spacing: -.7px;
            line-height: 1.15;
        }

        .pg-hdr .sub {
            font-size: 13px;
            color: var(--t2);
            margin-top: 5px;
            font-weight: 400;
            letter-spacing: -.1px;
        }

        .pg-hdr-right {
            display: flex;
            align-items: center;
            gap: 8px
        }

        /* Buttons — enhanced */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            height: 34px;
            padding: 0 15px;
            border-radius: var(--r-sm);
            font-size: 13px;
            font-weight: 600;
            border: 1px solid transparent;
            transition: background .18s ease, border-color .18s ease, color .18s ease, box-shadow .25s ease, transform .15s ease;
            letter-spacing: -.1px;
        }

        .btn svg {
            width: 12px;
            height: 12px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2.4;
            stroke-linecap: round
        }

        .btn-fill {
            background: linear-gradient(135deg, #6b4fff 0%, #5032f0 100%);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 1px 4px rgba(91, 63, 255, .3), inset 0 1px 0 rgba(255, 255, 255, .12);
        }

        .btn-fill:hover {
            background: linear-gradient(135deg, #7a5fff 0%, #5b3fff 100%);
            box-shadow: var(--shadow-brand), inset 0 1px 0 rgba(255, 255, 255, .15);
            transform: translateY(-1px);
        }

        .btn-fill:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(91, 63, 255, .25)
        }

        .btn-outline {
            background: var(--surface);
            color: var(--t2);
            border-color: var(--line);
            box-shadow: var(--shadow-xs);
        }

        .btn-outline:hover {
            border-color: var(--line-2);
            color: var(--t1);
            box-shadow: var(--shadow-sm);
            transform: translateY(-1px);
            background: #fcfcff;
        }

        .btn-outline:active {
            transform: translateY(0)
        }

        /* Date chip */
        .date-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            height: 34px;
            padding: 0 13px;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--r-sm);
            font-size: 12.5px;
            color: var(--t2);
            box-shadow: var(--shadow-xs);
            font-weight: 500;
        }

        .date-pill svg {
            width: 13px;
            height: 13px;
            stroke: var(--t3);
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round
        }

        /* ── KPI Grid — premium cards ── */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
            margin-bottom: 22px;
        }

        /* ── Green Impact KPI — native to design system ── */
        .kpi-green-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 11.5px;
            color: var(--t2);
            font-weight: 500;
        }

        .kpi-green-row strong {
            font-weight: 800;
            color: var(--t1);
            font-size: 14px;
            font-feature-settings: 'tnum';
            font-variant-numeric: tabular-nums;
        }

        .kpi-tree-est {
            font-size: 10.5px;
            color: var(--t3);
            margin-top: 10px;
            font-style: italic;
            text-align: center;
            border-top: 1px solid var(--line);
            padding-top: 8px;
        }

        .kpi {
            background: var(--surface);
            border: 1px solid var(--line);
            border-top: 1px solid rgba(255, 255, 255, .9);
            border-radius: var(--r);
            padding: 22px 24px;
            box-shadow: var(--shadow-sm);
            transition: border-color .22s ease, box-shadow .22s ease, transform .22s cubic-bezier(.2, .8, .4, 1);
            position: relative;
            overflow: hidden;
        }

        /* Subtle top highlight line */
        .kpi::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, .8) 30%, rgba(255, 255, 255, .8) 70%, transparent 100%);
        }

        .kpi:hover {
            border-color: var(--line-2);
            box-shadow: var(--shadow-lg);
            transform: translateY(-3px);
        }

        .kpi-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px
        }

        .kpi-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--t3);
            letter-spacing: .01em;
            text-transform: none
        }

        .kpi-ic {
            width: 32px;
            height: 32px;
            border-radius: 9px;
            display: grid;
            place-items: center;
        }

        .kpi-ic svg {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round
        }

        .kpi-ic.blue {
            background: rgba(59, 130, 246, .1);
            color: #2563eb;
            box-shadow: 0 1px 4px rgba(59, 130, 246, .15)
        }

        .kpi-ic.green {
            background: var(--green-bg);
            color: var(--green);
            box-shadow: 0 1px 4px rgba(5, 122, 85, .12)
        }

        .kpi-ic.amber {
            background: var(--amber-bg);
            color: var(--amber);
            box-shadow: 0 1px 4px rgba(180, 83, 9, .12)
        }

        .kpi-ic.purple {
            background: var(--brand-subtle);
            color: var(--brand);
            box-shadow: 0 1px 4px rgba(91, 63, 255, .14)
        }

        .kpi-val {
            font-size: 29px;
            font-weight: 800;
            color: var(--t1);
            letter-spacing: -1.8px;
            line-height: 1;
            font-feature-settings: 'tnum';
        }

        .kpi-foot {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 13px
        }

        .kpi-tag {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 2.5px 8px;
            border-radius: 5px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .01em;
        }

        .kpi-tag.up {
            background: var(--green-bg);
            color: var(--green);
            border: 1px solid rgba(110, 231, 199, .5)
        }

        .kpi-tag.flat {
            background: var(--gray-bg);
            color: var(--gray);
            border: 1px solid var(--gray-border)
        }

        .kpi-foot-txt {
            font-size: 11.5px;
            color: var(--t3);
            font-weight: 450
        }

        /* ── Two-column layout ── */
        .row {
            display: grid;
            gap: 16px;
            margin-bottom: 16px
        }

        .row-main {
            grid-template-columns: 1fr 306px
        }

        .row-bottom {
            grid-template-columns: 1fr 306px
        }

        /* ── Card — elevated ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--r);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: box-shadow .22s ease, border-color .22s ease, transform .22s cubic-bezier(.2, .8, .4, 1);
        }

        .card:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--line-2);
        }

        .card-hd {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 22px 13px;
            border-bottom: 1px solid var(--line);
            background: var(--surface-2);
        }

        .card-hd-left h3 {
            font-size: 13.5px;
            font-weight: 700;
            color: var(--t1);
            letter-spacing: -.25px;
        }

        .card-hd-left p {
            font-size: 12px;
            color: var(--t3);
            margin-top: 2px;
            font-weight: 450
        }

        .card-action {
            font-size: 12px;
            font-weight: 600;
            color: var(--brand);
            padding: 4px 10px;
            border-radius: 6px;
            border: none;
            background: none;
            cursor: pointer;
            transition: background .18s ease, color .18s ease, box-shadow .18s ease;
            letter-spacing: -.1px;
        }

        .card-action:hover {
            background: var(--brand-subtle);
            color: var(--brand-hover);
            box-shadow: 0 0 0 1px var(--brand-border);
        }

        /* ── Table — breathable ── */
        .tbl {
            width: 100%;
            border-collapse: collapse
        }

        .tbl th {
            padding: 10px 22px;
            font-size: 10.5px;
            font-weight: 700;
            color: var(--t3);
            text-align: left;
            text-transform: uppercase;
            letter-spacing: .08em;
            background: var(--surface-2);
            border-bottom: 1px solid var(--line);
        }

        .tbl td {
            padding: 12px 22px;
            font-size: 13px;
            color: var(--t2);
            border-bottom: 1px solid rgba(0, 0, 0, .024);
            vertical-align: middle;
        }

        .tbl tbody tr:last-child td {
            border-bottom: none
        }

        .tbl tbody tr {
            cursor: pointer;
            transition: background .15s ease;
        }

        .tbl tbody tr:hover td {
            background: rgba(91, 63, 255, .03);
        }

        .cell-id {
            font-family: var(--mono);
            font-size: 11.5px;
            font-weight: 500;
            color: var(--t1);
        }

        .cell-client {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .client-dot {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: grid;
            place-items: center;
            font-size: 10.5px;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
            box-shadow: 0 1px 4px rgba(0, 0, 0, .15);
        }

        .client-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--t1);
            letter-spacing: -.1px
        }

        .client-email {
            font-size: 11.5px;
            color: var(--t3);
            margin-top: 1px
        }

        .cell-amount {
            font-size: 13px;
            font-weight: 700;
            color: var(--t1);
            letter-spacing: -.2px
        }

        .cell-date {
            font-size: 12px;
            color: var(--t3);
            font-weight: 450
        }

        /* Status badge */
        .st {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3.5px 9px;
            border-radius: 5px;
            font-size: 11.5px;
            font-weight: 700;
            letter-spacing: .01em;
        }

        .st-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: currentColor;
            flex-shrink: 0
        }

        .st.paid {
            color: var(--green);
            background: var(--green-bg);
            border: 1px solid var(--green-border)
        }

        .st.pending {
            color: var(--amber);
            background: var(--amber-bg);
            border: 1px solid var(--amber-border)
        }

        .st.overdue {
            color: var(--red);
            background: var(--red-bg);
            border: 1px solid var(--red-border)
        }

        .st.draft {
            color: var(--gray);
            background: var(--gray-bg);
            border: 1px solid var(--gray-border)
        }

        .tbl-action {
            width: 26px;
            height: 26px;
            border-radius: 6px;
            border: none;
            background: none;
            display: inline-grid;
            place-items: center;
            cursor: pointer;
            transition: background .15s ease, box-shadow .15s ease;
        }

        .tbl-action:hover {
            background: var(--bg-solid);
            box-shadow: var(--shadow-xs)
        }

        .tbl-action svg {
            width: 13px;
            height: 13px;
            stroke: var(--t3);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round
        }

        /* ── Activity Feed ── */
        .feed {
            padding: 4px 0
        }

        .feed-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 11px 22px;
            transition: background .15s ease;
        }

        .feed-item:hover {
            background: rgba(91, 63, 255, .025)
        }

        .feed-spine {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 4px;
            flex-shrink: 0;
        }

        .feed-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: 0 0 0 2px rgba(255, 255, 255, .8)
        }

        .feed-wire {
            width: 1px;
            background: var(--line);
            flex: 1;
            min-height: 18px;
            margin-top: 4px
        }

        .feed-item:last-child .feed-wire {
            display: none
        }

        .feed-txt {
            font-size: 12.5px;
            color: var(--t2);
            line-height: 1.55
        }

        .feed-txt b {
            font-weight: 700;
            color: var(--t1)
        }

        .feed-ago {
            font-size: 11px;
            color: var(--t3);
            margin-top: 3px;
            font-weight: 450
        }

        /* ── Revenue Chart ── */
        .chart-inner {
            padding: 20px 22px 22px
        }

        .chart-kpi {
            margin-bottom: 18px
        }

        .chart-num {
            font-size: 24px;
            font-weight: 800;
            color: var(--t1);
            letter-spacing: -1.4px;
            line-height: 1;
            font-feature-settings: 'tnum';
        }

        .chart-desc {
            font-size: 12px;
            color: var(--t2);
            margin-top: 5px;
            font-weight: 450
        }

        .chart-trend {
            color: var(--green);
            font-weight: 700
        }

        .bars {
            display: flex;
            align-items: flex-end;
            gap: 5px;
            height: 90px
        }

        .bar-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px
        }

        .bar {
            width: 100%;
            border-radius: 4px 4px 0 0;
            background: rgba(91, 63, 255, .12);
            cursor: pointer;
            position: relative;
            min-height: 3px;
            transition: background .2s ease, box-shadow .2s ease;
        }

        .bar.active {
            background: linear-gradient(180deg, #7a5fff 0%, #5b3fff 100%);
            box-shadow: 0 -3px 10px rgba(91, 63, 255, .25);
        }

        .bar:hover {
            background: linear-gradient(180deg, #7a5fff 0%, #5b3fff 100%);
            box-shadow: 0 -3px 10px rgba(91, 63, 255, .25);
        }

        .bar-tip {
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--t1);
            color: white;
            font-size: 10.5px;
            font-weight: 600;
            font-family: var(--mono);
            padding: 3px 8px;
            border-radius: 5px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity .14s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .2);
        }

        .bar:hover .bar-tip {
            opacity: 1
        }

        .bar-lbl {
            font-size: 10px;
            font-weight: 600;
            color: var(--t3)
        }

        /* ── Top Clients ── */
        .client-list {
            padding: 4px 0
        }

        .cl-row {
            display: flex;
            align-items: center;
            gap: 11px;
            padding: 10px 22px;
            cursor: pointer;
            transition: background .15s ease;
        }

        .cl-row:hover {
            background: rgba(91, 63, 255, .025)
        }

        .cl-av {
            width: 29px;
            height: 29px;
            border-radius: 8px;
            display: grid;
            place-items: center;
            font-size: 11px;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
            box-shadow: 0 1px 4px rgba(0, 0, 0, .14);
        }

        .cl-mid {
            flex: 1;
            min-width: 0
        }

        .cl-nm {
            font-size: 13px;
            font-weight: 700;
            color: var(--t1);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: -.1px
        }

        .cl-track {
            height: 3px;
            background: rgba(91, 63, 255, .1);
            border-radius: 3px;
            margin-top: 6px;
            overflow: hidden
        }

        .cl-fill {
            height: 3px;
            border-radius: 3px;
            background: linear-gradient(90deg, #5b3fff, #7a5fff);
            transition: width .65s cubic-bezier(.4, 0, .2, 1)
        }

        .cl-right {
            text-align: right;
            flex-shrink: 0
        }

        .cl-amt {
            font-size: 12.5px;
            font-weight: 700;
            color: var(--t1);
            letter-spacing: -.2px
        }

        .cl-inv {
            font-size: 11px;
            color: var(--t3);
            margin-top: 2px;
            font-weight: 450
        }

        /* ── Toast — refined ── */
        .toast {
            position: fixed;
            bottom: 22px;
            right: 22px;
            background: var(--t1);
            color: white;
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 11px 18px;
            border-radius: var(--r-sm);
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 12px 40px rgba(0, 0, 0, .18), 0 4px 12px rgba(0, 0, 0, .1);
            z-index: 9999;
            transform: translateY(14px);
            opacity: 0;
            transition: transform .26s cubic-bezier(.4, 0, .2, 1), opacity .26s ease;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, .08);
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1
        }

        .t-pip {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #4ade80;
            flex-shrink: 0;
            box-shadow: 0 0 6px rgba(74, 222, 128, .6)
        }

        /* ── Reveal animation ── */
        .rev {
            opacity: 0;
            transform: translateY(12px);
            transition: opacity .4s ease, transform .4s cubic-bezier(.2, .8, .4, 1)
        }

        .rev.in {
            opacity: 1;
            transform: translateY(0)
        }

        .d1 {
            transition-delay: .05s
        }

        .d2 {
            transition-delay: .1s
        }

        .d3 {
            transition-delay: .15s
        }

        .d4 {
            transition-delay: .2s
        }

        .d5 {
            transition-delay: .25s
        }

        /* ── Responsive ── */
        @media(max-width:1400px) {
            .kpi-grid {
                grid-template-columns: repeat(3, 1fr)
            }
        }

        @media(max-width:1200px) {
            .kpi-grid {
                grid-template-columns: repeat(2, 1fr)
            }
        }

        @media(max-width:1000px) {

            .row-main,
            .row-bottom {
                grid-template-columns: 1fr
            }
        }

        @media(max-width:768px) {
            :root {
                --sb: 0px
            }

            .sb {
                transform: translateX(-232px);
                width: 232px;
                transition: transform .25s ease
            }

            .main {
                margin-left: 0
            }

            .page {
                padding: 16px
            }

            .topbar {
                padding: 0 16px
            }

            .kpi-grid {
                grid-template-columns: 1fr 1fr;
                gap: 12px
            }

            .kpi-val {
                font-size: 22px
            }
        }

        /* ══════════════════════════════════════════════════
           GST UNLOCK SYSTEM
        ══════════════════════════════════════════════════ */

        /* ══════════════════════════════════════════════════
           GST BANNER — Slim Clean Premium
        ══════════════════════════════════════════════════ */
        @keyframes gstBannerIn {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .gst-banner {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 13px 16px 13px 20px;
            margin-bottom: 24px;
            border-radius: 12px;
            background: #ffffff;
            border: 1px solid #ede9fe;
            box-shadow: 0 1px 6px rgba(109,40,217,.07), 0 1px 2px rgba(0,0,0,.04);
            position: relative;
            overflow: hidden;
            animation: gstBannerIn .35s cubic-bezier(.2,.8,.4,1) both;
        }

        /* Thin brand-purple left rail */
        .gst-banner::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, #a78bfa 0%, #7c3aed 100%);
            border-radius: 12px 0 0 12px;
        }

        .gst-banner::after { display: none; }

        /* Icon badge — small and crisp */
        .gst-banner-icon {
            width: 34px; height: 34px;
            border-radius: 9px;
            background: #f5f3ff;
            border: 1px solid #ede9fe;
            display: grid;
            place-items: center;
            flex-shrink: 0;
            box-shadow: none;
            position: relative;
            z-index: 1;
        }

        .gst-banner-icon svg {
            width: 15px; height: 15px;
            stroke: #7c3aed;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Text block */
        .gst-banner-text {
            flex: 1;
            min-width: 0;
        }

        .gst-banner-text strong {
            display: inline;
            font-size: 13px;
            font-weight: 700;
            color: #1c1033;
            letter-spacing: -.15px;
        }

        .gst-banner-text span {
            display: inline;
            font-size: 12.5px;
            color: #6b7280;
            font-weight: 400;
            margin-left: 6px;
        }

        /* Pills hidden */
        .gst-banner-pills { display: none; }
        .gst-banner-pill  { display: none; }

        /* CTA button — compact lavender pill */
        .gst-banner-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(105deg, #a78bfa 0%, #7c3aed 60%, #6d28d9 100%);
            color: #ffffff;
            font-size: 12.5px;
            font-weight: 700;
            font-family: var(--font);
            cursor: pointer;
            letter-spacing: -.05px;
            box-shadow:
                0 3px 12px rgba(124,58,237,.35),
                inset 0 1px 0 rgba(255,255,255,.2);
            transition: all .2s cubic-bezier(.34,1.3,.64,1);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .gst-banner-btn:hover {
            background: linear-gradient(105deg, #b89efb 0%, #8b5cf6 55%, #7c3aed 100%);
            transform: translateY(-1px);
            box-shadow:
                0 6px 18px rgba(124,58,237,.42),
                inset 0 1px 0 rgba(255,255,255,.22);
        }

        .gst-banner-btn:active {
            transform: translateY(0) scale(.98);
            box-shadow: 0 2px 6px rgba(124,58,237,.3);
        }

        .gst-banner-btn svg {
            width: 12px; height: 12px;
            stroke: rgba(255,255,255,.85); fill: none;
            stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
            transition: transform .18s ease;
        }

        .gst-banner-btn:hover svg { transform: translateX(2px); }

        /* Dismiss × */
        .gst-banner-dismiss {
            background: none;
            border: none;
            color: #d1d5db;
            cursor: pointer;
            padding: 5px;
            flex-shrink: 0;
            border-radius: 6px;
            transition: color .15s, background .15s;
            display: flex;
            align-items: center;
            margin-left: 2px;
        }

        .gst-banner-dismiss:hover {
            color: #6b7280;
            background: #f3f4f6;
        }

        .gst-banner-dismiss svg {
            width: 12px; height: 12px;
            stroke: currentColor; fill: none;
            stroke-width: 2.5; stroke-linecap: round;
        }

        /* Mobile */
        @media (max-width: 600px) {
            .gst-banner {
                flex-wrap: wrap;
                padding: 14px 14px 14px 18px;
                gap: 12px;
            }
            .gst-banner-text span { display: none; }
            .gst-banner-btn { flex: 1; justify-content: center; }
        }

        /* Banner hidden when GST verified */
        .gst-verified .gst-banner { display: none !important; }


        /* ── Verified badge in dashboard header ── */
        .gst-verified-badge {
            display: none;
            align-items: center;
            gap: 6px;
            padding: 4px 12px 4px 8px;
            background: var(--green-bg);
            border: 1px solid var(--green-border);
            border-radius: 99px;
            font-size: 11.5px;
            font-weight: 700;
            color: var(--green);
            letter-spacing: -.05px;
            animation: badgeIn .4s cubic-bezier(.34,1.56,.64,1) both;
        }

        @keyframes badgeIn {
            from { opacity: 0; transform: scale(.7); }
            to   { opacity: 1; transform: scale(1); }
        }

        .gst-verified-badge svg {
            width: 14px; height: 14px;
            stroke: var(--green); fill: none;
            stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
        }

        .gst-verified .gst-verified-badge { display: flex; }

        /* ── Elements hidden unless GST verified ── */
        .gst-only { display: none !important; }
        .gst-verified .gst-only { display: revert !important; }

        /* Sidebar GST badge */
        .sb-gst-badge {
            margin-left: auto;
            font-size: 9.5px;
            font-weight: 700;
            color: rgba(160,130,255,.9);
            background: rgba(91,63,255,.12);
            border: 1px solid rgba(91,63,255,.2);
            padding: 1px 7px;
            border-radius: 99px;
            letter-spacing: .04em;
        }

        .gst-verified .sb-gst-badge { display: none; }

        /* ── GST Verification Modal ── */
        .gst-overlay {
            position: fixed;
            inset: 0;
            background: rgba(5, 3, 18, .75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 9500;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .gst-overlay.open {
            display: flex;
            animation: overlayIn .3s ease both;
        }

        @keyframes overlayIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .gst-modal {
            width: 100%;
            max-width: 540px;
            background: linear-gradient(155deg, #0f0922 0%, #14082e 100%);
            border: 1px solid rgba(91,63,255,.3);
            border-radius: 22px;
            box-shadow: 0 32px 80px rgba(0,0,0,.55), 0 4px 24px rgba(91,63,255,.2);
            overflow: hidden;
            animation: modalIn .4s cubic-bezier(.34,1.15,.64,1) both;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(.92) translateY(20px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* orb */
        .gst-modal-orb {
            position: absolute;
            width: 280px; height: 280px;
            border-radius: 50%;
            background: rgba(91,63,255,.2);
            filter: blur(70px);
            top: -80px; right: -60px;
            pointer-events: none;
        }

        .gst-modal-head {
            padding: 28px 28px 22px;
            border-bottom: 1px solid rgba(255,255,255,.06);
            position: relative;
        }

        .gst-modal-eyebrow {
            font-size: 10.5px;
            font-weight: 700;
            letter-spacing: .14em;
            text-transform: uppercase;
            color: rgba(160,130,255,.8);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .gst-modal-eyebrow::before {
            content: '';
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #7a5fff;
            box-shadow: 0 0 8px rgba(91,63,255,.8);
        }

        .gst-modal-title {
            font-size: 22px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -.6px;
            line-height: 1.2;
        }

        .gst-modal-sub {
            font-size: 13px;
            color: rgba(255,255,255,.42);
            margin-top: 6px;
            line-height: 1.6;
        }

        .gst-modal-close {
            position: absolute;
            top: 22px; right: 22px;
            width: 32px; height: 32px;
            border-radius: 8px;
            background: rgba(255,255,255,.06);
            border: 1px solid rgba(255,255,255,.08);
            display: grid;
            place-items: center;
            cursor: pointer;
            transition: background .2s;
        }

        .gst-modal-close:hover { background: rgba(255,255,255,.1); }

        .gst-modal-close svg {
            width: 14px; height: 14px;
            stroke: rgba(255,255,255,.5); fill: none;
            stroke-width: 2.5; stroke-linecap: round;
        }

        .gst-modal-body {
            padding: 24px 28px 28px;
        }

        /* Form fields */
        .gst-field {
            margin-bottom: 16px;
        }

        .gst-label {
            display: block;
            font-size: 11.5px;
            font-weight: 700;
            color: rgba(255,255,255,.5);
            text-transform: uppercase;
            letter-spacing: .07em;
            margin-bottom: 7px;
        }

        .gst-input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1.5px solid rgba(91,63,255,.25);
            background: rgba(255,255,255,.05);
            color: #fff;
            font-family: var(--font);
            font-size: 14px;
            outline: none;
            transition: border-color .2s, background .2s, box-shadow .2s;
        }

        .gst-input::placeholder { color: rgba(255,255,255,.22); }

        .gst-input:focus {
            border-color: rgba(91,63,255,.7);
            background: rgba(91,63,255,.08);
            box-shadow: 0 0 0 3px rgba(91,63,255,.15);
        }

        .gst-input.error {
            border-color: rgba(239,68,68,.6);
            background: rgba(239,68,68,.05);
        }

        .gst-input select { color: #fff; }

        .gst-row2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .gst-optional {
            font-size: 10px;
            font-weight: 500;
            color: rgba(255,255,255,.25);
            margin-left: 5px;
            letter-spacing: 0;
            text-transform: none;
        }

        .gst-field-err {
            font-size: 11px;
            color: #f87171;
            margin-top: 5px;
            display: none;
            font-weight: 600;
        }

        .gst-submit {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #7a5fff 0%, #5b3fff 100%);
            color: white;
            font-size: 14.5px;
            font-weight: 700;
            font-family: var(--font);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 8px 28px rgba(91,63,255,.45);
            transition: all .25s cubic-bezier(.34,1.3,.64,1);
            margin-top: 8px;
            position: relative;
            overflow: hidden;
        }

        .gst-submit::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,.1), transparent);
        }

        .gst-submit:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 14px 36px rgba(91,63,255,.55);
        }

        .gst-submit:disabled {
            opacity: .65;
            cursor: not-allowed;
            transform: none;
        }

        .gst-submit svg {
            width: 15px; height: 15px;
            stroke: white; fill: none;
            stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
        }

        /* Success state */
        .gst-success {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 16px 0 8px;
            gap: 12px;
        }

        .gst-success-ic {
            width: 64px; height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(5,122,85,.3), rgba(6,78,59,.2));
            border: 2px solid rgba(110,231,199,.4);
            display: grid;
            place-items: center;
            box-shadow: 0 0 32px rgba(5,122,85,.2);
            animation: popIn .5s cubic-bezier(.34,1.56,.64,1) both;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(.4); }
            to   { opacity: 1; transform: scale(1); }
        }

        .gst-success-ic svg {
            width: 28px; height: 28px;
            stroke: #4ade80; fill: none;
            stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
        }

        .gst-success-title {
            font-size: 20px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -.4px;
        }

        .gst-success-sub {
            font-size: 13px;
            color: rgba(255,255,255,.42);
            line-height: 1.6;
            max-width: 340px;
        }

        .gst-success-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 4px;
        }

        .gst-success-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: 99px;
            background: rgba(91,63,255,.15);
            border: 1px solid rgba(91,63,255,.25);
            font-size: 12px;
            color: rgba(160,130,255,.9);
            font-weight: 600;
        }

        .gst-success-pill svg {
            width: 11px; height: 11px;
            stroke: rgba(160,130,255,.8); fill: none;
            stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
        }

        .gst-done-btn {
            width: 100%;
            padding: 13px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #7a5fff 0%, #5b3fff 100%);
            color: white;
            font-size: 14px;
            font-weight: 700;
            font-family: var(--font);
            cursor: pointer;
            box-shadow: 0 8px 28px rgba(91,63,255,.4);
            transition: all .2s;
            margin-top: 8px;
        }

        .gst-done-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 32px rgba(91,63,255,.5);
        }

        /* Skeleton spinner */
        @keyframes spin { to { transform: rotate(360deg); } }
        .gst-spin {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }

        /* ── Tax Reports page ── */
        #tax-reports-page .tax-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--r);
            padding: 28px;
            box-shadow: var(--shadow-sm);
        }

        .tax-kpi-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 24px;
        }

        .tax-kpi {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--r);
            padding: 20px 22px;
            box-shadow: var(--shadow-sm);
        }

        .tax-kpi-label { font-size: 12px; color: var(--t3); font-weight: 600; margin-bottom: 8px; }
        .tax-kpi-val { font-size: 24px; font-weight: 800; color: var(--t1); letter-spacing: -1.2px; }
        .tax-kpi-sub { font-size: 11.5px; color: var(--t3); margin-top: 4px; }

        .gst-num-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 3px 12px 3px 8px;
            background: rgba(91,63,255,.08);
            border: 1px solid rgba(91,63,255,.18);
            border-radius: 99px;
            font-size: 11.5px;
            font-weight: 700;
            color: var(--brand);
            font-family: var(--mono);
            letter-spacing: .04em;
        }

        .gst-num-badge svg {
            width: 12px; height: 12px;
            stroke: var(--brand); fill: none;
            stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
        }
        /* ═══ GREEN IMPACT PAGE — PREMIUM ANIMATIONS ═══ */

        /* Confetti canvas */
        #gi-confetti {
            position: fixed; inset: 0;
            pointer-events: none;
            z-index: 9999;
        }

        /* Floating tree */
        @keyframes giFloat {
            0%, 100% { transform: translateY(0px) rotate(-1deg); }
            50%       { transform: translateY(-10px) rotate(1deg); }
        }
        @keyframes giGlow {
            0%, 100% { text-shadow: 0 0 0px rgba(16,185,129,0); }
            50%       { text-shadow: 0 0 24px rgba(16,185,129,.5); }
        }
        .gi-float { animation: giFloat 4s ease-in-out infinite; display:inline-block; }

        /* Gradient background drift on education card */
        @keyframes giGradDrift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .gi-edu-card {
            background-size: 200% 200%;
            animation: giGradDrift 8s ease infinite;
        }

        /* Progress bar shimmer */
        @keyframes giShimmer {
            0%   { left: -100%; }
            100% { left: 200%; }
        }
        .gi-bar-wrap {
            width: 100%; height: 14px;
            background: #f0eeff;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }
        .gi-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #059669);
            border-radius: 8px;
            width: 0%;
            transition: width 1.2s cubic-bezier(.34, 1.56, .64, 1);
            position: relative;
            overflow: hidden;
        }
        .gi-bar-fill::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; bottom: 0;
            width: 60%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,.6), transparent);
            animation: giShimmer 2s ease-in-out infinite;
        }

        /* Claim button — locked breathing glow */
        @keyframes giBreath {
            0%, 100% { box-shadow: 0 0 0 0 rgba(91,63,255,.0); }
            50%       { box-shadow: 0 0 0 6px rgba(91,63,255,.12); }
        }
        @keyframes giShine {
            0%   { left: -120%; }
            100% { left: 120%; }
        }
        .gi-claim-locked {
            animation: giBreath 2.5s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }
        .gi-claim-ready {
            position: relative;
            overflow: hidden;
        }
        .gi-claim-ready::before {
            content: '';
            position: absolute;
            top: 0; left: -120%; bottom: 0;
            width: 60%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,.25), transparent);
            animation: giShine 2.2s ease-in-out infinite;
        }

        /* Reward item hover */
        .gi-reward-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            border: 1px solid var(--line);
            border-radius: 12px;
            background: var(--surface);
            box-shadow: var(--shadow-sm);
            transition: transform .22s cubic-bezier(.2,.8,.4,1), box-shadow .22s ease, border-color .22s ease;
            cursor: default;
        }
        .gi-reward-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(91,63,255,.10);
            border-color: rgba(91,63,255,.2);
        }
        .gi-reward-icon {
            width: 44px; height: 44px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            transition: transform .3s cubic-bezier(.34,1.56,.64,1);
        }
        .gi-reward-item:hover .gi-reward-icon {
            transform: scale(1.18) rotate(-4deg);
        }

        /* Milestone row animation */
        @keyframes giRowIn {
            from { opacity: 0; transform: translateX(-12px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        .gi-milestone-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid var(--line);
            opacity: 0;
            animation: giRowIn .4s ease forwards;
        }
        .gi-milestone-row:last-child { border-bottom: none; }

        /* Claimed milestone pulse */
        @keyframes giPulse {
            0%   { box-shadow: 0 0 0 0 rgba(5,150,105,.3); }
            70%  { box-shadow: 0 0 0 10px rgba(5,150,105,0); }
            100% { box-shadow: 0 0 0 0 rgba(5,150,105,0); }
        }
        .gi-milestone-claimed-badge {
            animation: giPulse 1.4s ease 0.3s;
        }

        /* Smart message chip */
        .gi-smart-msg {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--green);
            background: var(--green-bg);
            border: 1px solid var(--green-border);
            border-radius: 99px;
            padding: 6px 14px;
            width: fit-content;
        }

        /* Tooltip */
        [data-tip] { position: relative; }
        [data-tip]::after {
            content: attr(data-tip);
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%) scale(0.95);
            background: #0f0a2e;
            color: white;
            font-size: 11px;
            font-weight: 600;
            padding: 5px 10px;
            border-radius: 6px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity .2s ease, transform .2s ease;
        }
        [data-tip]:hover::after {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }
    
        @media (max-width: 768px) {
            .sb { display: none !important; }
            .main { margin-left: 0 !important; }
            .page { padding: 16px !important; }
            .topbar { padding: 0 16px !important; }
            .pg-hdr h1 { font-size: 18px !important; }
        }
    
        /* Premium Text Logo Styles */
        .brand-wrapper { display: flex; align-items: center; gap: 8px; }
        .brand-icon { height: 42px; width: auto; object-fit: contain; flex-shrink: 0; display: block; }
        .brand-text-col { display: flex; flex-direction: column; justify-content: center; align-items: flex-start; }
        .brand-logo-text { font-size: 26px; font-weight: 800; letter-spacing: -0.8px; line-height: 1; font-family: var(--font, 'Inter', system-ui, sans-serif); color: var(--ink, #0a0a0f); }
        .left-logo .brand-logo-text { color: #ffffff; }
        .brand-bill { color: inherit; }
        .brand-sathi { background: linear-gradient(135deg, #5b3fff, #a855f7); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .brand-tagline { font-size: 7.5px; font-weight: 700; letter-spacing: 1.2px; color: #8888a0; text-transform: uppercase; margin-top: 3px; line-height: 1; font-family: var(--font, 'Inter', system-ui, sans-serif); }

        .sb-logo .brand-icon { height: 34px; }
        .sb-logo .brand-logo-text { font-size: 21px; }
        .sb-logo .brand-tagline { font-size: 6.5px; }

        @media (max-width: 768px) {
            .brand-icon { height: 34px; }
            .brand-logo-text { font-size: 21px; }
            .brand-tagline { font-size: 6.5px; }
        }

    </style>

<body>

    <!-- Toast -->
    <div class="toast" id="toast"><span class="t-pip"></span><span id="t-msg"></span></div>

    <div class="shell">
        <div class="sb" style="width: 240px;">
            <div class="sb-logo">
                <div class="brand-wrapper">
    <img src="assets/favicon.png" alt="BillSathi Icon" class="brand-icon" />

</div>

                <!-- Filters -->

                    </button>

                <!-- Invoice Table -->
                <div class="tbl-wrap" style="background: var(--surface); border: 1px solid var(--line); border-radius: var(--r); overflow-x: auto; -webkit-overflow-scrolling: touch; box-shadow: var(--shadow-sm);">
                    <table style="width: 100%; min-width: 650px; border-collapse: collapse; text-align: left;">
                        <thead>
                            <tr style="background: var(--surface-2); border-bottom: 1px solid var(--line); font-size: 11px; color: var(--t3); text-transform: uppercase; letter-spacing: 0.05em;">

    <script>
        // Check if customer is logged in
        if (localStorage.getItem('customerLoggedIn') !== 'true') {
            window.location.href = 'customer-login.html';
        }
        
        var identifier = localStorage.getItem('customerIdentifier') || 'Customer';

        // Wait for DOM to load to render
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('welcome-name').textContent = identifier;
            renderBills();
        });

        function handleLogout() {
            localStorage.removeItem('customerLoggedIn');
            localStorage.removeItem('customerIdentifier');
            window.location.href = 'customer-login.html';
        }

        /* ── MOCK BILL DATA ── */
        // In reality, this would fetch from backend based on identifier
        const ALL_BILLS = [
            { id: 'INV-0048', client: 'Google LLC', email: 'billing@google.com', phone: '+1 234 567 8900', amt: 12400, status: 'paid', date: 'Mar 15', due: 'Apr 14', clr: '#4285f4' },
            { id: 'INV-0047', client: 'Stripe Inc.', email: 'accounts@stripe.com', phone: '+1 987 654 3210', amt: 8750, status: 'pending', date: 'Mar 14', due: 'Apr 13', clr: '#635bff' },
            { id: 'INV-0046', client: 'Google LLC', email: 'billing@google.com', phone: '+1 234 567 8900', amt: 3200, status: 'paid', date: 'Feb 12', due: 'Mar 12', clr: '#4285f4' },
            { id: 'INV-0045', client: 'Vercel Corp.', email: 'invoices@vercel.com', phone: '+1 555 123 4567', amt: 6100, status: 'paid', date: 'Mar 10', due: 'Apr 09', clr: '#374151' },
            { id: 'INV-0044', client: 'Stripe Inc.', email: 'accounts@stripe.com', phone: '+1 987 654 3210', amt: 4900, status: 'overdue', date: 'Feb 07', due: 'Mar 07', clr: '#635bff' },
            { id: 'INV-0043', client: 'Loom Inc.', email: 'accounts@loom.com', phone: '+1 444 333 2222', amt: 2250, status: 'pending', date: 'Mar 05', due: 'Apr 04', clr: '#7c3aed' },
            { id: 'INV-0042', client: 'Google LLC', email: 'billing@google.com', phone: '+1 234 567 8900', amt: 5600, status: 'pending', date: 'Mar 03', due: 'Apr 02', clr: '#4285f4' },
        ];

        let FILTERED_BILLS = [];

        function renderBills() {
            var tbody = document.getElementById('bills-tbody');
            var search = document.getElementById('search-input').value.toLowerCase();
            
            // Filter by identifier (phone or email) AND search text
            // In demo, if identifier isn't one of the known ones, just show everything to make demo look good
            let userBills = ALL_BILLS;
            let knownIdentifiers = ['billing@google.com', '+1 234 567 8900', 'accounts@stripe.com', '+1 987 654 3210', 'invoices@vercel.com', '+1 555 123 4567', 'accounts@loom.com', '+1 444 333 2222'];
            
            if (knownIdentifiers.includes(identifier)) {
                userBills = ALL_BILLS.filter(b => b.email === identifier || b.phone === identifier);
            }

            if (search) {
                userBills = userBills.filter(b => b.id.toLowerCase().includes(search) || b.client.toLowerCase().includes(search) || b.status.toLowerCase().includes(search));
            }
            
            FILTERED_BILLS = userBills;

            if (userBills.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" style="text-align: center; padding: 40px; color: var(--t3);">
                            <div style="font-size: 40px; margin-bottom: 10px;">📄</div>
                            <h3 style="color: var(--t1); margin-bottom: 5px;">No bills found</h3>
                            <p>We couldn't find any invoices matching your search.</p>
                        </td>
                    </tr>
                `;
                return;
            }

            const $$ = n => '$' + n.toLocaleString();

            const tableHtml = userBills.map(r => `
    <tr style="border-bottom: 1px solid var(--line); transition: background 0.2s;" onmouseover="this.style.background='var(--bg-solid)'" onmouseout="this.style.background='transparent'">
      <td class="cell-id" style="padding: 16px 20px; font-weight: 700; color: var(--t1);" style="font-weight: 700; color: var(--t1);">#${r.id}</td>
      <td style="padding: 16px 20px;">
        <div style="display:flex; align-items:center; gap:10px;">
          <div style="width:28px; height:28px; border-radius:50%; background:${r.clr}; color:white; display:grid; place-items:center; font-size:11px; font-weight:700;">${r.client[0]}</div>
          <div>
            <div style="font-weight:600; color:var(--t1);">${r.client}</div>
            <div style="font-size:11px; color:var(--t3);">${r.date}</div>
          </div>
        </div>
      </td>
      <td style="padding: 16px 20px; color: var(--t2); font-weight: 500;">${r.due}</td>
      <td style="padding: 16px 20px; font-weight: 700; color: var(--t1); font-feature-settings: 'tnum';">${$$(r.amt)}</td>
      <td style="padding: 16px 20px;">
        <div class="st-badge st-${r.status}" style="display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 99px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; ${r.status === 'paid' ? 'background: var(--green-bg); color: var(--green);' : r.status === 'pending' ? 'background: var(--amber-bg); color: var(--amber);' : 'background: var(--red-bg); color: var(--red);'}">
          <div style="width: 5px; height: 5px; border-radius: 50%; background: currentColor;"></div>
          ${r.status}
        </div>
      </td>
      <td style="padding: 16px 20px; text-align: right;">
        <button class="btn btn-outline" style="margin-right: 8px;" onclick="viewInvoice('${r.id}')">View</button>
        <button class="btn btn-fill" onclick="downloadPdf('${r.id}')">
            <svg viewBox="0 0 24 24" style="width:14px;height:14px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            PDF
        </button>
      </td>
    </tr>`).join('');

            tbody.innerHTML = tableHtml;
        }

        function viewInvoice(id) {
            showToast('Opening invoice ' + id + '...', 2000);
            // In a real app, redirect to view page or open modal
        }

        function downloadPdf(id) {
            showToast('Downloading PDF for ' + id + '...', 3000);
        }

        function showToast(msg, d) {
            d = d || 3000;
            var t = document.createElement('div');
            t.className = 'toast show';
            t.style.position = 'fixed';
            t.style.bottom = '24px';
            t.style.left = '50%';
            t.style.transform = 'translateX(-50%)';
            t.style.background = '#0f0a2e';
            t.style.color = 'white';
            t.style.padding = '13px 22px';
            t.style.borderRadius = '12px';
            t.style.fontSize = '13px';
            t.style.fontWeight = '500';
            t.style.boxShadow = '0 12px 40px rgba(0, 0, 0, .25)';
            t.style.zIndex = '9999';
            t.innerHTML = '<div style="display:flex;align-items:center;gap:8px;"><div style="width:18px;height:18px;background:var(--brand);border-radius:50%;display:grid;place-items:center;"><svg viewBox="0 0 12 12" style="width:10px;height:10px;stroke:white;fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;"><polyline points="2 6 5 9 10 3"/></svg></div><span>' + msg + '</span></div>';
            document.body.appendChild(t);
            setTimeout(function () { 
                t.style.opacity = '0';
                t.style.transform = 'translateX(-50%) translateY(20px)';
                t.style.transition = 'all 0.4s ease';
                setTimeout(() => t.remove(), 400);
            }, d);
        }

        // Animate body in
        setTimeout(() => document.body.classList.add('up'), 50);
    </script>
</body>

</html>
